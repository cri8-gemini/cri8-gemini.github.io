name: 데이터 갱신 및 배포

on:
  # 06:00 KST. 육류 시세는 주 1회 갱신이지만 매일 확인해도 비용이 없고,
  # 값이 안 바뀐 날은 커밋 자체가 생기지 않는다.
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write   # data/ 커밋
  pages: write      # Pages 배포
  id-token: write   # deploy-pages 인증

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 두 수집기 모두 표준 라이브러리만 쓴다 — 설치할 의존성이 없다.
      - name: 육류 시세 수집
        run: python scripts/collect_usmef.py

      - name: TXRH 주가 수집
        run: python scripts/collect_txrh.py

      # NEWSLINE PDF 는 주 1회 올라온다. 한 호에 5주치가 실려서 최신 호만 받아도
      # 직전 4주가 매번 다시 들어온다. 그래서 전체를 다시 받지 않고, 마지막으로
      # 찾은 호 다음 날부터만 찔러본다 (보통 하루 0~7번 요청).
      - name: NEWSLINE PDF 수집 (증분)
        run: |
          pip install --quiet -r requirements.txt
          python scripts/parse_newsline.py

      # 커밋보다 먼저 빌드한다. build_site.py 가 data/merged_weekly.csv 를
      # 생성하므로, 순서가 반대면 병합 CSV 만 항상 한 실행 뒤처진 채 커밋된다.
      - name: 사이트 빌드
        run: |
          python scripts/build_site.py
          mkdir -p _site
          cp index.html _site/
          # CSV 를 사이트에서도 내려받을 수 있게 둔다. PDF 원본은 뺀다 — 용량이
          # 크고 원본은 usmef.co.kr 에 그대로 있다.
          mkdir -p _site/data
          cp data/*.csv _site/data/

      # 저장소에는 데이터만 커밋한다. index.html 은 생성물이라 커밋하면 로컬
      # 작업분과 충돌한다. 배포는 아래에서 아티팩트로 올린다.
      - name: 데이터 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "데이터 변경 없음 — 커밋 생략"
          else
            git commit -m "데이터 갱신 $(date -u +%Y-%m-%d)"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
