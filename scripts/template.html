<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TXRH vs 미국 육류 시세</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; }

  .viz-root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --plane: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --grid: #e1e0d9;
    --axis: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    --series-stock: #2a78d6;
    --series-meat: #eb6834;
    /* 상관계수는 부호가 뜻을 가지므로 발산형(따뜻함↔차가움) 한 쌍을 쓴다 */
    --pos: #2a78d6;
    --neg: #e34948;
    --neutral: #c3c2b7;
    --band: rgba(11, 11, 11, 0.05);
    --wash: rgba(11, 11, 11, 0.04);

    background: var(--plane);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 32px 20px 56px;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --plane: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --axis: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --series-stock: #3987e5;
      --series-meat: #d95926;
      --pos: #3987e5;
      --neg: #e66767;
      --neutral: #898781;
      --band: rgba(255, 255, 255, 0.06);
      --wash: rgba(255, 255, 255, 0.06);
    }
  }
  :root[data-theme="dark"] .viz-root {
    color-scheme: dark;
    --surface-1: #1a1a19;
    --plane: #0d0d0d;
    --text-primary: #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted: #898781;
    --grid: #2c2c2a;
    --axis: #383835;
    --border: rgba(255, 255, 255, 0.10);
    --series-stock: #3987e5;
    --series-meat: #d95926;
    --pos: #3987e5;
    --neg: #e66767;
    --neutral: #898781;
    --band: rgba(255, 255, 255, 0.06);
    --wash: rgba(255, 255, 255, 0.06);
  }

  .wrap { max-width: 980px; margin: 0 auto; }

  h1 { font-size: 24px; font-weight: 650; margin: 0 0 6px; letter-spacing: -0.01em; }
  .sub { color: var(--text-secondary); font-size: 14px; margin: 0 0 24px; }

  .controls { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .group-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    appearance: none; cursor: pointer;
    font: inherit; font-size: 13px;
    padding: 5px 12px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-1); color: var(--text-secondary);
  }
  .chip:hover { background: var(--wash); }
  .chip[aria-pressed="true"] {
    background: var(--text-primary); color: var(--surface-1);
    border-color: var(--text-primary);
  }
  .chip:focus-visible { outline: 2px solid var(--series-stock); outline-offset: 2px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .tile {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .tile-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .tile-value { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .tile-note { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 18px 10px;
  }
  .card-title { font-size: 14px; font-weight: 600; margin: 0 0 2px; }
  .card-note { font-size: 12px; color: var(--text-muted); margin: 0 0 12px; }

  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin: 4px 0 14px; font-size: 13px; }
  .legend-item { display: flex; align-items: center; gap: 7px; color: var(--text-secondary); }
  .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }

  .plot { position: relative; }
  .plot svg { display: block; width: 100%; touch-action: pan-y; }

  .tooltip {
    position: absolute; pointer-events: none; opacity: 0;
    transform: translate(-50%, -100%);
    background: var(--surface-1); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px; font-size: 12.5px; line-height: 1.45;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
    white-space: nowrap; z-index: 5;
    transition: opacity 120ms ease;
  }
  .tooltip.on { opacity: 1; }
  .tt-date { color: var(--text-muted); margin-bottom: 5px; }
  .tt-row { display: flex; align-items: center; gap: 7px; }
  .tt-val { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 600; }

  .table-wrap { overflow-x: auto; max-height: 460px; overflow-y: auto; margin-top: 4px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 6px 10px; text-align: right; white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  td { font-variant-numeric: tabular-nums; color: var(--text-secondary); }
  thead th {
    position: sticky; top: 0; background: var(--surface-1);
    color: var(--text-muted); font-weight: 500; font-size: 12px;
    border-bottom: 1px solid var(--axis);
  }
  tbody tr + tr td { border-top: 1px solid var(--grid); }

  footer { margin-top: 20px; font-size: 12px; color: var(--text-muted); }
  footer a { color: inherit; }
  .hidden { display: none; }

  @media (max-width: 640px) {
    .viz-root { padding: 24px 14px 40px; }
    .stats { grid-template-columns: 1fr; }
    .tile-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="viz-root">
<div class="wrap">

  <h1>TXRH vs 미국 육류 시세</h1>
  <p class="sub">
    텍사스 로드하우스 주가와 원가 지표를 같은 기준으로 비교합니다.
    두 값의 단위가 달라 <strong>구간 시작 = 100</strong>으로 지수화했습니다.
  </p>

  <div class="controls">
    <div class="group">
      <span class="group-label" id="lbl-range">기간</span>
      <div class="chips" role="group" aria-labelledby="lbl-range" id="range-chips"></div>
    </div>
    <div class="group">
      <span class="group-label" id="lbl-meat">육류 지표</span>
      <div class="chips" role="group" aria-labelledby="lbl-meat" id="meat-chips"></div>
    </div>
    <div class="group">
      <span class="group-label" id="lbl-scale">세로축</span>
      <div class="chips" role="group" aria-labelledby="lbl-scale" id="scale-chips"></div>
    </div>
    <div class="group">
      <span class="group-label" id="lbl-view">보기</span>
      <div class="chips" role="group" aria-labelledby="lbl-view" id="view-chips"></div>
    </div>
  </div>

  <div class="stats">
    <div class="tile">
      <div class="tile-label" id="s1-label">TXRH 기간 수익률</div>
      <div class="tile-value" id="s1-value">—</div>
      <div class="tile-note" id="s1-note"></div>
    </div>
    <div class="tile">
      <div class="tile-label" id="s2-label">육류 지표 변화</div>
      <div class="tile-value" id="s2-value">—</div>
      <div class="tile-note" id="s2-note"></div>
    </div>
    <div class="tile">
      <div class="tile-label">주간 변화율 상관계수</div>
      <div class="tile-value" id="s3-value">—</div>
      <div class="tile-note" id="s3-note"></div>
    </div>
  </div>

  <div class="card">
    <h2 class="card-title" id="chart-title">지수 추이</h2>
    <p class="card-note" id="chart-note"></p>

    <div class="legend" id="legend"></div>

    <div id="chart-view">
      <div class="plot" id="plot">
        <svg id="svg" role="img" aria-labelledby="chart-title"></svg>
        <div class="tooltip" id="tooltip" role="status" aria-live="polite"></div>
      </div>
    </div>

    <div id="table-view" class="hidden">
      <div class="table-wrap">
        <table id="table"></table>
      </div>
    </div>
  </div>

  <div class="card" id="lag-card" style="margin-top:16px">
    <h2 class="card-title" id="lag-title">시차 상관</h2>
    <p class="card-note" id="lag-note"></p>
    <div class="plot" id="lag-plot">
      <svg id="lag-svg" role="img" aria-labelledby="lag-title"></svg>
      <div class="tooltip" id="lag-tooltip" role="status" aria-live="polite"></div>
    </div>
    <p class="card-note" id="lag-read" style="margin-top:10px"></p>
  </div>

  <footer>
    <p id="foot-meta"></p>
    <p>
      육류 시세: USMEF · 주가: Yahoo Finance 주봉 수정종가(배당·분할 반영).
      상관계수는 인과관계를 뜻하지 않습니다.
    </p>
  </footer>

</div>
</div>

<script>
const DATA = /*__DATA__*/null;

const COL = {};
DATA.columns.forEach((key, i) => { COL[key] = i + 1; });

const RANGES = [
  { id: "all", label: "전체" },
  { id: "10y", label: "10년", years: 10 },
  { id: "5y", label: "5년", years: 5 },
  { id: "1y", label: "1년", years: 1 },
];

const state = {
  range: "1y",
  meat: DATA.meat[0].key,
  // 두 계열의 상승폭 차이가 워낙 커서(21년 기준 16배 vs 1.2배) 선형 축에서는
  // 육류 선이 바닥에 눌린다. 로그 축에서는 세로 거리 = 변화율이라 나란히 읽힌다.
  scale: "log",
  view: "chart",
};

const el = (id) => document.getElementById(id);
const meatMeta = () => DATA.meat.find((m) => m.key === state.meat);

/* ---------- 데이터 ---------- */

// 지수화·상관계수 모두 두 계열이 함께 있는 주만 쓴다. 한쪽만 있는 주를
// 섞으면 기준점이 서로 다른 날짜가 되어 지수가 어긋난다.
function visibleRows() {
  const meatIdx = COL[state.meat];
  const paired = DATA.rows.filter((r) => r[COL.txrh] != null && r[meatIdx] != null);
  if (!paired.length) return [];

  const range = RANGES.find((r) => r.id === state.range);
  if (!range.years) return paired;

  const last = new Date(paired[paired.length - 1][0]);
  const cutoff = new Date(last);
  cutoff.setFullYear(cutoff.getFullYear() - range.years);
  return paired.filter((r) => new Date(r[0]) >= cutoff);
}

function indexed(rows) {
  const meatIdx = COL[state.meat];
  const baseStock = rows[0][COL.txrh];
  const baseMeat = rows[0][meatIdx];
  return rows.map((r) => ({
    date: r[0],
    t: new Date(r[0]).getTime(),
    stock: (r[COL.txrh] / baseStock) * 100,
    meat: (r[meatIdx] / baseMeat) * 100,
    rawStock: r[COL.txrh],
    rawMeat: r[meatIdx],
  }));
}

// 시차 k(주) = 육류가 k 주 먼저 움직인 것을 주가와 맞춰 본다.
// 음수면 반대로 주가가 먼저다. 0 이면 같은 주.
const LAGS = [-13, -8, -4, 0, 4, 8, 13, 26];
const MIN_OBS = 12; // 관측치가 이보다 적으면 상관계수를 신뢰할 수 없다

function lagCorrelations(points) {
  // 변화율은 인접 주 사이에서만 계산한다 (수준이 아니라 변화율 기준).
  const stockRet = [], meatRet = [];
  for (let i = 1; i < points.length; i++) {
    stockRet.push(points[i].rawStock / points[i - 1].rawStock - 1);
    meatRet.push(points[i].rawMeat / points[i - 1].rawMeat - 1);
  }

  return LAGS.map((lag) => {
    const a = [], b = [];
    for (let i = 0; i < stockRet.length; i++) {
      const j = i - lag; // 육류를 lag 주 앞당겨 같은 시점에 놓는다
      if (j < 0 || j >= meatRet.length) continue;
      a.push(stockRet[i]); b.push(meatRet[j]);
    }
    return { lag, ...pearson(a, b) };
  }).filter((d) => d.n >= MIN_OBS);
}

function pearson(a, b) {
  if (a.length < 3) return { r: null, n: a.length };
  const mean = (xs) => xs.reduce((s, x) => s + x, 0) / xs.length;
  const ma = mean(a), mb = mean(b);
  let num = 0, da = 0, db = 0;
  for (let i = 0; i < a.length; i++) {
    const xa = a[i] - ma, xb = b[i] - mb;
    num += xa * xb; da += xa * xa; db += xb * xb;
  }
  return { r: da && db ? num / Math.sqrt(da * db) : null, n: a.length };
}

// 관측치가 n 개일 때 우연히 나올 수 있는 상관계수의 대략적 크기.
// 이 띠 안에 들어오면 "관계 없음"으로 읽어야 한다.
const noiseBand = (n) => 1.96 / Math.sqrt(n);

function correlation(points) {
  // 수준(level)이 아니라 주간 변화율로 계산한다. 둘 다 장기 우상향이면
  // 수준 상관은 관계가 없어도 1에 가깝게 나오기 때문.
  const a = [], b = [];
  for (let i = 1; i < points.length; i++) {
    const ps = points[i - 1].rawStock, pm = points[i - 1].rawMeat;
    if (!ps || !pm) continue;
    a.push(points[i].rawStock / ps - 1);
    b.push(points[i].rawMeat / pm - 1);
  }
  if (a.length < 3) return null;

  const mean = (xs) => xs.reduce((s, x) => s + x, 0) / xs.length;
  const ma = mean(a), mb = mean(b);
  let num = 0, da = 0, db = 0;
  for (let i = 0; i < a.length; i++) {
    const xa = a[i] - ma, xb = b[i] - mb;
    num += xa * xb; da += xa * xa; db += xb * xb;
  }
  if (!da || !db) return null;
  return { r: num / Math.sqrt(da * db), n: a.length };
}

/* ---------- 포맷 ---------- */

const fmt = (v, d = 2) => {
  if (v == null || !isFinite(v)) return "—";
  // 반올림 후 0 이면 부호를 떼어낸다 (-0.0009 가 "-0.00" 으로 찍히는 걸 막는다)
  const rounded = Number(v.toFixed(d)) || 0;
  return rounded.toLocaleString("ko-KR", { minimumFractionDigits: d, maximumFractionDigits: d });
};
const pct = (v) => (v == null ? "—" : (v >= 0 ? "+" : "") + fmt(v * 100, 1) + "%");
const shortDate = (iso) => iso.slice(2).replace(/-/g, ".");

/* ---------- 축 눈금 ---------- */

function niceTicks(min, max, count) {
  const span = max - min;
  if (span <= 0) return [min];
  const rough = span / count;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  const step = (norm >= 5 ? 10 : norm >= 2 ? 5 : norm >= 1 ? 2 : 1) * mag;
  const ticks = [];
  for (let v = Math.ceil(min / step) * step; v <= max + 1e-9; v += step) {
    ticks.push(v === 0 ? 0 : v); // Math.ceil 이 -0 을 만들어 "-0" 으로 찍히는 걸 막는다
  }
  return ticks;
}

// 로그 축 눈금은 1·2·5 × 10^k 자리에만 찍는다. 구간이 좁아 3개도 안 나오면
// 선형 눈금으로 되돌린다 (1년 구간처럼 변동폭이 작을 때).
function logTicks(lo, hi) {
  const ticks = [];
  for (let k = Math.floor(Math.log10(lo)); k <= Math.ceil(Math.log10(hi)); k++) {
    for (const c of [1, 2, 5]) {
      const v = c * Math.pow(10, k);
      if (v >= lo && v <= hi) ticks.push(v);
    }
  }
  return ticks.length >= 3 ? ticks : niceTicks(lo, hi, 5);
}

function yearTicks(points, width) {
  const seen = new Set();
  const out = [];
  points.forEach((p) => {
    const y = p.date.slice(0, 4);
    if (!seen.has(y)) { seen.add(y); out.push({ t: p.t, label: y }); }
  });
  const maxTicks = Math.max(3, Math.floor(width / 68));
  const stride = Math.ceil(out.length / maxTicks);
  return out.filter((_, i) => i % stride === 0);
}

/* ---------- 렌더 ---------- */

const NS = "http://www.w3.org/2000/svg";
const PAD = { top: 16, right: 64, bottom: 26, left: 46 };
const HEIGHT = 340;

let current = { points: [], scaleX: null, scaleY: null };

function node(name, attrs, text) {
  const n = document.createElementNS(NS, name);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (text != null) n.textContent = text;
  return n;
}

function renderChart(points) {
  const svg = el("svg");
  const width = el("plot").clientWidth || 900;
  svg.setAttribute("viewBox", `0 0 ${width} ${HEIGHT}`);
  svg.setAttribute("height", HEIGHT);
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const innerW = width - PAD.left - PAD.right;
  const innerH = HEIGHT - PAD.top - PAD.bottom;

  const useLog = state.scale === "log";
  const values = points.flatMap((p) => [p.stock, p.meat]);
  let lo = Math.min(...values), hi = Math.max(...values);
  if (useLog) {
    // 로그 축은 0 이하를 못 그리므로 비율로 여백을 준다.
    lo = Math.max(lo / 1.1, 1e-6); hi *= 1.1;
  } else {
    const pad = (hi - lo) * 0.08 || 5;
    lo = Math.max(0, lo - pad); hi += pad;
  }

  const tf = useLog ? Math.log10 : (v) => v;
  const tLo = tf(lo), tHi = tf(hi);

  const scaleX = (t) => PAD.left + ((t - points[0].t) / (points[points.length - 1].t - points[0].t || 1)) * innerW;
  const scaleY = (v) => PAD.top + innerH - ((tf(v) - tLo) / (tHi - tLo || 1)) * innerH;
  current = { points, scaleX, scaleY, width };

  // 가로 그리드 + y 눈금
  (useLog ? logTicks(lo, hi) : niceTicks(lo, hi, 5)).forEach((v) => {
    const y = scaleY(v);
    svg.appendChild(node("line", {
      x1: PAD.left, x2: PAD.left + innerW, y1: y, y2: y,
      stroke: "var(--grid)", "stroke-width": 1,
    }));
    svg.appendChild(node("text", {
      x: PAD.left - 9, y: y + 4, "text-anchor": "end",
      fill: "var(--text-muted)", "font-size": 11, "font-variant-numeric": "tabular-nums",
    }, fmt(v, 0)));
  });

  // 기준선 100
  if (lo < 100 && hi > 100) {
    svg.appendChild(node("line", {
      x1: PAD.left, x2: PAD.left + innerW, y1: scaleY(100), y2: scaleY(100),
      stroke: "var(--axis)", "stroke-width": 1, "stroke-dasharray": "3 3",
    }));
  }

  // x 눈금
  yearTicks(points, innerW).forEach((tick) => {
    svg.appendChild(node("text", {
      x: scaleX(tick.t), y: HEIGHT - 8, "text-anchor": "middle",
      fill: "var(--text-muted)", "font-size": 11,
    }, tick.label));
  });

  svg.appendChild(node("line", {
    x1: PAD.left, x2: PAD.left + innerW, y1: PAD.top + innerH, y2: PAD.top + innerH,
    stroke: "var(--axis)", "stroke-width": 1,
  }));

  // 크로스헤어 (호버 시 표시)
  const cross = node("line", {
    y1: PAD.top, y2: PAD.top + innerH, stroke: "var(--axis)",
    "stroke-width": 1, opacity: 0,
  });
  cross.id = "cross";
  svg.appendChild(cross);

  const line = (key, color) => {
    const d = points.map((p, i) => `${i ? "L" : "M"}${scaleX(p.t).toFixed(1)},${scaleY(p[key]).toFixed(1)}`).join("");
    svg.appendChild(node("path", {
      d, fill: "none", stroke: color, "stroke-width": 2,
      "stroke-linejoin": "round", "stroke-linecap": "round",
    }));
  };
  line("meat", "var(--series-meat)");
  line("stock", "var(--series-stock)");

  // 선 끝 직접 라벨 — 색만으로 계열을 구분하지 않도록
  const last = points[points.length - 1];
  const ends = [
    { v: last.stock, color: "var(--series-stock)", label: DATA.stockLabel },
    { v: last.meat, color: "var(--series-meat)", label: meatMeta().label },
  ].sort((a, b) => a.v - b.v);
  if (Math.abs(scaleY(ends[0].v) - scaleY(ends[1].v)) < 14) {
    ends[0].shift = 7; ends[1].shift = -7;
  }
  ends.forEach((end) => {
    svg.appendChild(node("text", {
      x: PAD.left + innerW + 8, y: scaleY(end.v) + 4 + (end.shift || 0),
      fill: end.color, "font-size": 11.5, "font-weight": 600,
    }, end.label));
  });

  // 호버 마커
  ["stock", "meat"].forEach((key) => {
    const dot = node("circle", {
      r: 4.5, opacity: 0,
      fill: key === "stock" ? "var(--series-stock)" : "var(--series-meat)",
      stroke: "var(--surface-1)", "stroke-width": 2,
    });
    dot.id = "dot-" + key;
    svg.appendChild(dot);
  });

  // 히트 영역 — 마크보다 넉넉하게
  const hit = node("rect", {
    x: PAD.left, y: PAD.top, width: innerW, height: innerH, fill: "transparent",
  });
  hit.style.cursor = "crosshair";
  svg.appendChild(hit);
}

/* ---------- 호버 ---------- */

function nearest(clientX) {
  const { points, scaleX } = current;
  const rect = el("svg").getBoundingClientRect();
  const ratio = el("svg").viewBox.baseVal.width / rect.width;
  const x = (clientX - rect.left) * ratio;

  let best = 0, bestDist = Infinity;
  for (let i = 0; i < points.length; i++) {
    const dist = Math.abs(scaleX(points[i].t) - x);
    if (dist < bestDist) { bestDist = dist; best = i; }
  }
  return points[best];
}

function showHover(clientX) {
  if (!current.points.length) return;
  const p = nearest(clientX);
  const { scaleX, scaleY } = current;
  const x = scaleX(p.t);

  const cross = el("svg").querySelector("#cross");
  cross.setAttribute("x1", x); cross.setAttribute("x2", x); cross.setAttribute("opacity", 1);

  [["stock", p.stock], ["meat", p.meat]].forEach(([key, v]) => {
    const dot = el("svg").querySelector("#dot-" + key);
    dot.setAttribute("cx", x); dot.setAttribute("cy", scaleY(v)); dot.setAttribute("opacity", 1);
  });

  const tip = el("tooltip");
  tip.innerHTML = `
    <div class="tt-date">${p.date}</div>
    <div class="tt-row">
      <span class="swatch" style="background:var(--series-stock)"></span>
      <span>${DATA.stockLabel}</span>
      <span class="tt-val">${fmt(p.stock, 1)} <span style="color:var(--text-muted);font-weight:400">· $${fmt(p.rawStock)}</span></span>
    </div>
    <div class="tt-row">
      <span class="swatch" style="background:var(--series-meat)"></span>
      <span>${meatMeta().label}</span>
      <span class="tt-val">${fmt(p.meat, 1)} <span style="color:var(--text-muted);font-weight:400">· ${fmt(p.rawMeat)}</span></span>
    </div>`;

  const plotRect = el("plot").getBoundingClientRect();
  const svgRect = el("svg").getBoundingClientRect();
  const px = (x / el("svg").viewBox.baseVal.width) * svgRect.width;
  tip.style.left = Math.min(Math.max(px, 70), plotRect.width - 70) + "px";
  tip.style.top = Math.max(scaleY(Math.max(p.stock, p.meat)) / HEIGHT * svgRect.height - 12, 4) + "px";
  tip.classList.add("on");
}

function hideHover() {
  const svg = el("svg");
  const cross = svg.querySelector("#cross");
  if (cross) cross.setAttribute("opacity", 0);
  ["stock", "meat"].forEach((k) => {
    const dot = svg.querySelector("#dot-" + k);
    if (dot) dot.setAttribute("opacity", 0);
  });
  el("tooltip").classList.remove("on");
}

/* ---------- 시차 상관 ---------- */

const LAG_H = 210;
const LAG_PAD = { top: 14, right: 14, bottom: 34, left: 40 };

function renderLag(points) {
  const data = lagCorrelations(points);
  const svg = el("lag-svg");
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  if (!data.length) {
    el("lag-note").textContent = `구간이 짧아 시차를 볼 수 없습니다 (최소 ${MIN_OBS}주 필요).`;
    el("lag-read").textContent = "";
    return;
  }

  const width = el("lag-plot").clientWidth || 900;
  svg.setAttribute("viewBox", `0 0 ${width} ${LAG_H}`);
  svg.setAttribute("height", LAG_H);

  const innerW = width - LAG_PAD.left - LAG_PAD.right;
  const innerH = LAG_H - LAG_PAD.top - LAG_PAD.bottom;

  // 잡음 띠는 시차마다 다르다. 시차가 클수록 겹치는 구간이 짧아져 관측치가
  // 줄고, 우연히 나올 수 있는 상관계수는 그만큼 커진다. 하나로 통일하면
  // 관측치가 많은 시차를 과하게 깎아내리게 된다.
  data.forEach((d) => { d.band = noiseBand(d.n); });

  const maxBand = Math.max(...data.map((d) => d.band));
  const bound = Math.max(0.4, Math.ceil(Math.max(...data.map((d) => Math.abs(d.r) || 0), maxBand) * 10) / 10);
  const y = (v) => LAG_PAD.top + innerH / 2 - (v / bound) * (innerH / 2);
  const slot = innerW / data.length;
  const barW = Math.min(38, slot * 0.5);

  // 잡음 띠 — 이 안쪽은 우연으로도 나올 수 있는 크기
  data.forEach((d, i) => {
    svg.appendChild(node("rect", {
      x: LAG_PAD.left + slot * i, y: y(d.band),
      width: slot, height: y(-d.band) - y(d.band),
      fill: "var(--band)",
    }));
  });

  [-bound, 0, bound].forEach((v) => {
    svg.appendChild(node("line", {
      x1: LAG_PAD.left, x2: LAG_PAD.left + innerW, y1: y(v), y2: y(v),
      stroke: v === 0 ? "var(--axis)" : "var(--grid)", "stroke-width": 1,
    }));
    svg.appendChild(node("text", {
      x: LAG_PAD.left - 8, y: y(v) + 4, "text-anchor": "end",
      fill: "var(--text-muted)", "font-size": 11, "font-variant-numeric": "tabular-nums",
    }, fmt(v, 1)));
  });

  data.forEach((d, i) => {
    const cx = LAG_PAD.left + slot * (i + 0.5);
    const weak = Math.abs(d.r) < d.band;
    const color = weak ? "var(--neutral)" : d.r >= 0 ? "var(--pos)" : "var(--neg)";
    const top = Math.min(y(d.r), y(0));
    const height = Math.abs(y(d.r) - y(0));

    svg.appendChild(node("rect", {
      x: cx - barW / 2, y: top, width: barW, height: Math.max(height, 1),
      fill: color, rx: 3,
      "data-lag": d.lag, "data-r": d.r, "data-n": d.n, "data-weak": weak ? "1" : "",
    }));

    // 막대마다 값을 직접 적어서 색에만 기대지 않는다
    svg.appendChild(node("text", {
      x: cx, y: d.r >= 0 ? top - 5 : top + height + 13, "text-anchor": "middle",
      fill: "var(--text-secondary)", "font-size": 11, "font-variant-numeric": "tabular-nums",
    }, fmt(d.r, 2)));

    svg.appendChild(node("text", {
      x: cx, y: LAG_H - 16, "text-anchor": "middle",
      fill: "var(--text-muted)", "font-size": 11,
    }, d.lag === 0 ? "동시" : `${d.lag > 0 ? "+" : ""}${d.lag}주`));
  });

  svg.appendChild(node("text", {
    x: LAG_PAD.left, y: LAG_H - 2, fill: "var(--text-muted)", "font-size": 10.5,
  }, "◀ 주가가 먼저"));
  svg.appendChild(node("text", {
    x: LAG_PAD.left + innerW, y: LAG_H - 2, "text-anchor": "end",
    fill: "var(--text-muted)", "font-size": 10.5,
  }, "육류가 먼저 ▶"));

  el("lag-note").textContent =
    "육류 시세를 앞뒤로 옮겨 가며 주간 변화율 상관을 다시 계산합니다 · "
    + "회색 띠 안쪽은 우연으로도 나올 수 있는 크기입니다 "
    + "(시차가 클수록 겹치는 구간이 짧아져 띠가 넓어집니다)";

  const strongest = data.reduce((best, d) =>
    Math.abs(d.r) > Math.abs(best.r) ? d : best);
  const meaningful = Math.abs(strongest.r) >= strongest.band;
  el("lag-read").textContent = meaningful
    ? `가장 큰 값은 ${strongest.lag === 0 ? "동시점" : `육류가 ${strongest.lag > 0 ? strongest.lag + "주 먼저"
      : -strongest.lag + "주 뒤"}`}일 때 ${fmt(strongest.r, 2)} 입니다. `
      + `띠를 벗어나긴 했지만 여러 시차를 한꺼번에 본 결과라, 하나가 우연히 튀어나올 수 있습니다.`
    : `모든 시차가 잡음 띠 안에 있습니다 — 이 구간에서는 시차를 두어도 뚜렷한 관계가 보이지 않습니다.`;
}

function lagHover(clientX) {
  const svg = el("lag-svg");
  const bars = [...svg.querySelectorAll("rect[data-lag]")];
  if (!bars.length) return;

  const rect = svg.getBoundingClientRect();
  const ratio = svg.viewBox.baseVal.width / rect.width;
  const x = (clientX - rect.left) * ratio;

  let best = null, bestDist = Infinity;
  bars.forEach((bar) => {
    const cx = +bar.getAttribute("x") + +bar.getAttribute("width") / 2;
    const dist = Math.abs(cx - x);
    if (dist < bestDist) { bestDist = dist; best = bar; }
  });

  const lag = +best.dataset.lag, r = +best.dataset.r, n = +best.dataset.n;
  const when = lag === 0 ? "같은 주" : lag > 0 ? `육류가 ${lag}주 먼저` : `주가가 ${-lag}주 먼저`;
  const tip = el("lag-tooltip");
  tip.innerHTML = `<div class="tt-date">${when}</div>
    <div class="tt-row"><span>상관계수</span><span class="tt-val">${fmt(r, 3)}</span></div>
    <div class="tt-row"><span>관측치</span><span class="tt-val">${n}주</span></div>
    ${best.dataset.weak ? '<div class="tt-date" style="margin:4px 0 0">잡음 범위 안</div>' : ""}`;

  const cx = +best.getAttribute("x") + +best.getAttribute("width") / 2;
  const px = (cx / svg.viewBox.baseVal.width) * rect.width;
  tip.style.left = Math.min(Math.max(px, 76), el("lag-plot").clientWidth - 76) + "px";
  tip.style.top = "6px";
  tip.classList.add("on");
}

/* ---------- 표 ---------- */

function renderTable(points) {
  const head = `<thead><tr>
    <th>주</th><th>${DATA.stockLabel} 지수</th><th>${DATA.stockLabel} ($)</th>
    <th>${meatMeta().label} 지수</th><th>${meatMeta().label}</th>
  </tr></thead>`;
  const body = points.map((p) => `<tr>
    <td>${p.date}</td><td>${fmt(p.stock, 1)}</td><td>${fmt(p.rawStock)}</td>
    <td>${fmt(p.meat, 1)}</td><td>${fmt(p.rawMeat)}</td>
  </tr>`).join("");
  el("table").innerHTML = head + `<tbody>${body}</tbody>`;
}

/* ---------- 요약 ---------- */

function renderStats(points) {
  const first = points[0], last = points[points.length - 1];

  el("s1-value").textContent = pct(last.rawStock / first.rawStock - 1);
  el("s1-note").textContent = `$${fmt(first.rawStock)} → $${fmt(last.rawStock)}`;

  el("s2-label").textContent = meatMeta().label + " 변화";
  el("s2-value").textContent = pct(last.rawMeat / first.rawMeat - 1);
  el("s2-note").textContent = `${fmt(first.rawMeat)} → ${fmt(last.rawMeat)}`;

  const corr = correlation(points);
  el("s3-value").textContent = corr ? fmt(corr.r, 2) : "—";
  el("s3-note").textContent = corr ? `주간 ${corr.n}개 구간` : "구간이 너무 짧습니다";
}

function renderLegend() {
  el("legend").innerHTML = [
    { color: "var(--series-stock)", label: `${DATA.stockLabel} (수정종가)` },
    { color: "var(--series-meat)", label: meatMeta().label },
  ].map((s) => `<span class="legend-item">
      <span class="swatch" style="background:${s.color}"></span>${s.label}
    </span>`).join("");
}

/* ---------- 컨트롤 ---------- */

function chips(container, items, selected, onPick) {
  el(container).innerHTML = items.map((item) =>
    `<button class="chip" type="button" role="button" aria-pressed="${item.id === selected}" data-id="${item.id}">${item.label}</button>`
  ).join("");
  el(container).querySelectorAll(".chip").forEach((btn) => {
    btn.addEventListener("click", () => onPick(btn.dataset.id));
  });
}

function render() {
  const rows = visibleRows();

  chips("range-chips", RANGES, state.range, (id) => { state.range = id; render(); });
  chips("meat-chips", DATA.meat.map((m) => ({ id: m.key, label: m.label })), state.meat,
    (id) => { state.meat = id; render(); });
  chips("scale-chips", [{ id: "log", label: "로그" }, { id: "linear", label: "선형" }], state.scale,
    (id) => { state.scale = id; render(); });
  chips("view-chips", [{ id: "chart", label: "차트" }, { id: "table", label: "표" }], state.view,
    (id) => { state.view = id; render(); });

  if (!rows.length) {
    el("chart-note").textContent = "이 구간에는 두 값이 모두 있는 주가 없습니다.";
    return;
  }

  const points = indexed(rows);
  current.points = points; // 표 보기에서도 리사이즈 시 시차 차트를 다시 그릴 수 있도록
  renderLegend();
  renderStats(points);

  el("chart-title").textContent = `${DATA.stockLabel} vs ${meatMeta().label} — 지수 추이`;
  el("chart-note").textContent =
    `${points[0].date} = 100 기준 · 주간 ${points.length}개 구간 · `
    + (state.scale === "log" ? "로그 축 (세로 거리가 같으면 변화율이 같습니다)" : "선형 축");

  el("chart-view").classList.toggle("hidden", state.view !== "chart");
  el("table-view").classList.toggle("hidden", state.view !== "table");

  if (state.view === "chart") renderChart(points); else renderTable(points);

  el("lag-title").textContent = `${DATA.stockLabel} vs ${meatMeta().label} — 시차 상관`;
  renderLag(points);
}

/* ---------- 부트 ---------- */

el("foot-meta").textContent =
  `자동 갱신 · 마지막 수집 ${DATA.generated.replace("T", " ").replace("+00:00", " UTC")}`;

const plot = el("plot");
plot.addEventListener("pointermove", (e) => { if (state.view === "chart") showHover(e.clientX); });
plot.addEventListener("pointerleave", hideHover);

const lagPlot = el("lag-plot");
lagPlot.addEventListener("pointermove", (e) => lagHover(e.clientX));
lagPlot.addEventListener("pointerleave", () => el("lag-tooltip").classList.remove("on"));

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!current.points.length) return;
    if (state.view === "chart") renderChart(current.points);
    renderLag(current.points);
  }, 120);
});

render();
</script>
</body>
</html>
